name: FloodWatch SL CI Pipeline

on:
  pull_request:
    branches: [ main ]

jobs:
  test-backend:
    runs-on: ubuntu-latest  # <-- Spins up a fresh Linux VM

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4 # Copies your code into the VM

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r api/requirements.txt

    - name: Run Smoke Test Pipeline
      run: |
        export PYTHONPATH=$GITHUB_WORKSPACE
        python scripts/test_predict_pipeline.py # <-- If this script exits with Code 0, CI passes!